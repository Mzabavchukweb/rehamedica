# Publikacja folderu site/ na GitHub Pages.
# W Settings → Pages ustaw Source na „GitHub Actions".
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Podmień domenę na adres podglądu (og/canonical/schema/sitemap)
        # Tylko dla podglądu github.io. Źródło w repo zostaje z rehamedica.info.pl (produkcja).
        # Dzięki temu udostępniony link github.io pokazuje NOWĄ stronę, nie starą produkcyjną.
        run: |
          find site -type f \( -name '*.html' -o -name '*.xml' -o -name '*.txt' \) \
            -exec sed -i 's#https://rehamedica\.info\.pl#https://mzabavchukweb.github.io/rehamedica#g' {} +
      - name: 404 na podglądzie — prefiks /rehamedica/ dla ścieżek root-absolutnych
        # 404.html bywa serwowana pod dowolną ścieżką, więc używa ścieżek root-absolutnych (/css, /js…).
        # Na produkcji (Cloudflare, domena w korzeniu) działają wprost; na github.io (podkatalog
        # /rehamedica/) trzeba je poprzedzić prefiksem. Dotyczy WYŁĄCZNIE 404.html — inne strony
        # używają ścieżek względnych i nie są tu ruszane. Kotwice (#…) i sprite (#i-…) pomijamy.
        run: |
          sed -i -E 's#(href|src)="/#\1="/rehamedica/#g' site/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
